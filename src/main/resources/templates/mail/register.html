<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
</head>
<body style="margin:0; padding:0; background:#f5f5f5;">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#f5f5f5; padding:20px;">
    <tr>
        <td align="center">
            <table width="480" cellpadding="0" cellspacing="0" style="background:#fff; border-radius:12px; overflow:hidden; box-shadow:0 2px 12px rgba(0,0,0,0.08);">

                <!-- 顶部 Logo -->
                <tr>
                    <td style="background:#007bff; padding:20px 0; text-align:center;">
                        <h2 style="margin:0; font-size:24px; color:#ffffff;">IOR 账户注册</h2>
                    </td>
                </tr>

                <!-- 正文 -->
                <tr>
                    <td style="padding:40px 30px; text-align:center;">
                        <p style="margin:0 0 10px; font-size:16px; color:#555555;">您好，您正在进行 IOR 账户注册。</p>
                        <p style="margin:0 0 20px; font-size:16px; color:#555555;">您的验证码为：</p>

                        <!-- 验证码 -->
                        <div style="font-size:36px; font-weight:bold; color:#333333; letter-spacing:8px; margin:20px 0; padding:10px; background-color:#f8f9fa; border-radius:4px; display:inline-block;">
                            {code}
                        </div>

                        <p style="margin:20px 0 0; font-size:14px; color:#555555;">该验证码将在 <b>5 分钟</b> 后失效，请勿泄露给他人。</p>
                        <p style="margin:10px 0 0; font-size:14px; color:#555555;">如果这不是您本人的操作，请直接忽略此邮件。</p>
                    </td>
                </tr>

                <!-- 底部 -->
                <tr>
                    <td style="background-color:#f8f9fa; padding:20px; text-align:center; font-size:12px; color:#999999;">
                        <p style="margin:0;">&copy; 2026 IOR . All rights reserved.</p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
